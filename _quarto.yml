project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - schedule/*.qmd
  resources:
    - img/
    - css/
    - slides/
    - schedule/
    - codes/


website:
  title: "Introduction to R for Researchers"
  site-url: https://sichaow58.github.io/Intro2R_workshop/
  google-analytics: G-68JBPLLNLG
  page-footer: >
      This workshop has been developed by statisticians of CSTAT at Michigan State University [CSTAT](https://cstat.msu.edu/)
  
  
  navbar:
    left:
      - text: "Schedule"
        href: schedule/schedule.qmd
      - text: "Workshop Materials"
        href: schedule/links-to-lessons.qmd
    right:
      - text: "CSTAT"
        href: https://cstat.msu.edu/
      - text: "GitHub"
        href: https://github.com/SichaoW58/Intro2R_workshop
          

format:
  html:
    theme: simplex
    css: css/styles.css
    fig-align: "center"
    toc: true
    number-sections: false
    code-block-bg: true
    code-copy: true      # enables copy button (default in most themes)
    code-tools: true     # enables the copy button!
    code-line-wrap: wrap
    prompt: true         
    self-contained: true


# Global Execution Defaults
execute:
  echo: true               # show code
  eval: false              # keep site build lightweight; codes are published as materials
  warning: false           # show warnings
  error: false             # show errors
  message: false           # show messages
  prompt: true
